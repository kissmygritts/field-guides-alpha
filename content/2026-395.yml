# 2026-395 — migrated from guides/2026-395/config.json (structure) + hand-ported prose.
#
# STRUCTURE (moon, darkSites, gps, day/stop membership, elev→number, alt promotion,
# and the `feed` split) was generated from guides/2026-395/config.json with:
#     node build/config-to-yml.mjs 2026-395
# The old `feed: { owens: [owens, cerrogordo] }` merged-gallery key is retired: its
# fed sub-stop Cerro Gordo is now its own promoted `optional` stop (id `cerrogordo`),
# carrying the images the manifest keys under `cerrogordo` — no gallery merging.
# PROSE (masthead, descriptions, directions, theShot, day themes/briefs/legs,
# fieldNotes, colophon) is hand-ported from guides/2026-395/content.html — the copy
# IS the product (non-negotiable #4). The SVG stop-visual placeholders are dropped;
# galleries come from finalize (public/guides/<slug>/ + images: below).
masthead:
  eyebrow: Shooting Script · Solo · Late Aug – Early Sep
  title: San Diego to Reno, the *long way* up 395
  dek: >-
    Three days east of the Sierra crest — desert tufa, living ghost towns, granite arches and dawn-lit alkali flats. Built to shoot the ends of the day and drive through the heat. No portraits, no LA, no Death Valley in September.
  meta:
    - ~530 mi total
    - 3 nights camping
    - Depart Fri 4:00 AM
    - Route I-15 → CA-395
    - Golden hours are the whole point
  # Friday departure — drives the derived "Day N · Weekday" labels (Fri, Sat, Sun).
  startDate: 2026-08-21

moon:
  start: 2026-08-18
  end: 2026-09-08

darkSites: Trona, Alabama Hills, the bristlecones, Mono

days:
  - theme: The Desert Day
    route: San Diego → Lone Pine
    summary: >-
      Chase the desert while it's cool. Shoot two big subjects before noon, drive the heat, land at the Alabama Hills for golden hour. ~330 mi.
    legs:
      - at: 4:00a
        text: depart · I-15 N
      - at: ~8:30a
        text: Trona
      - at: ~11a
        text: Randsburg
      - at: lunch
        text: Ridgecrest
      - at: pm
        text: Fossil Falls
      - at: golden
        text: Alabama Hills
    brief:
      - label: Fuel
        icon: "⛽"
        value: Ridgecrest — last real gas before Lone Pine. Top off.
      - label: Signal
        icon: "📵"
        value: Dead from Trona through Owens Valley. Download everything first.
      - label: Water
        icon: "💧"
        value: Carry 4+ L — none at Trona, Fossil Falls or Owens.
      - label: Drive
        icon: "🚗"
        value: ~330 mi · 6–7 hr moving
      - label: Camp
        icon: "▲"
        value: >-
          **Alabama Hills** (free BLM dispersed, Movie Road) or **Tuttle Creek CG** nearby for a table + vault toilet. Arrive before dark to claim a spot and scout — desert nights here are mild but the wind kicks up. Midday is drive time: fuel and lunch in **Ridgecrest**, the last real town before Lone Pine, then push north as the Sierra crest opens on your left into Owens Valley.
    stops:
      - id: trona
        name: Trona Pinnacles
        when: First light · ~8:30–9:30 AM
        gps:
          lat: 35.6142
          lng: -117.3664
          label: BLM tufa area, off CA-178
          elev: 1690
        description: >-
          Your marquee desert subject — **500+ tufa spires on a dry lakebed**, straight out of a Shainblum frame. Access is ~5 mi of graded, washboarded dirt off CA-178; fine for a normal car if you crawl it. Beat the heat and the crowds: you want the low raking sun that separates each spire from its shadow. By 10:30 it flattens and bakes.
        directions:
          - label: Light
            value: Low side-light, E/SE
          - label: Glass
            value: 24–70 + a longer lens to stack spires
          - label: Access
            value: 5 mi washboard dirt — crawl it
            warn: true
        theShot: >-
          Get low. Use a foreground spire as anchor, compress a cluster behind it with the longer lens so they overlap into a ridge of teeth. Shadows pointing at camera-left.
        images:
          - file: trona-wide.webp
            role: wide
            source: wikimedia
            artist: John R Savageau
            license: CC BY-SA 4.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/4.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Trona_Pinnacles_at_Sunrise_Late_Winter.jpg
          - file: trona-shot.webp
            role: shot
            source: wikimedia
            artist: John R Savageau
            license: CC BY-SA 4.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/4.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Trona_Pinnacles_Close_Up_at_Sunrise.jpg
          - file: trona-mood.webp
            role: mood
            source: wikimedia
            artist: John R Savageau
            license: CC BY-SA 4.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/4.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Trona_Pinnacles_with_Sunrise_Peeking_Above_Mountains.jpg

      - id: randsburg
        name: Randsburg
        when: Late morning · ~11 AM
        gps:
          lat: 35.3686
          lng: -117.6558
          label: Butte Ave, main street
          elev: 3523
        description: >-
          A **living ghost town** — wooden sidewalks, gold-rush facades, mining bones in the hills, ~100 residents still hanging on. This is your Nick Carver Americana chapter: hand-painted signage, sun-bleached siding, rust and patina. Detail and texture work, so midday flat light is fine here — you're not shooting sky.
        directions:
          - label: Light
            value: Flat is fine · shade for detail
          - label: Glass
            value: 35 / 50 · get tight on texture
          - label: Also
            value: Red Mtn & Jo'burg on the way
        theShot: >-
          One clean facade dead-on, symmetrical, filling the frame — then break it with a tight detail: a cracked sign, a padlock, boots of peeling paint. Shoot for a diptych.
        images:
          - file: randsburg-wide.webp
            role: wide
            source: wikimedia
            artist: inkknife_2000 (7.5 million views +)
            license: CC BY-SA 2.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Randsburg_Ghost_Town,_CA_1987_(6384941443).jpg
          - file: randsburg-detail.webp
            role: detail
            source: wikimedia
            artist: inkknife_2000 (7.5 million views +)
            license: CC BY-SA 2.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Randsburg_Ghost_Town,_CA_1987_(6384943047).jpg

      - id: fossilfalls
        name: Fossil Falls
        when: Late morning · quick stop
        gps:
          lat: 35.97
          lng: -117.9126
          label: trailhead off US-395
          elev: 3200
        description: >-
          A dry waterfall of **water-polished black basalt** — the ancient Owens River carved obsidian-smooth flutes, potholes and voids into a volcanic flow, with **Red Hill cinder cone** rising behind. A five-minute walk from the lot off US-395; almost nobody stops. Low raking light sculpts the rock best, but even midday hard shadow reads the strange scooped texture.
        directions:
          - label: Light
            value: Low & hard — rakes the flutes
          - label: Glass
            value: 24–70 + something close for texture
          - label: Access
            value: Short graded dirt off US-395 — any car
        theShot: >-
          Get down into the rock: frame a smooth black void or pothole against the pale desert beyond, Red Hill cone as a distant anchor. Watch your footing — the drops are real.
        images:
          - file: fossilfalls-shot.webp
            role: shot
            source: wikimedia
            artist: blmcalifornia
            license: Public domain
            sourceUrl: https://commons.wikimedia.org/wiki/File:Fossil_Falls_Campground_(49916156643).jpg
          - file: fossilfalls-wide.webp
            role: wide
            source: wikimedia
            artist: blmcalifornia
            license: Public domain
            sourceUrl: https://commons.wikimedia.org/wiki/File:Fossil_Falls_Campground_(49916960592).jpg
          - file: fossilfalls-mood.webp
            role: mood
            source: wikimedia
            artist: Powerhouse55
            license: CC BY 3.0
            licenseUrl: https://creativecommons.org/licenses/by/3.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Volcanic_cinder_cone_fossil_falls.JPG

      - id: owens
        name: Owens (dry) Lake
        badge: roadside
        optional: true
        when: Afternoon pass-through
        gps:
          lat: 36.4231
          lng: -117.9339
          label: Owens dry lakebed
          elev: 3600
        description: >-
          A stark alkali plain with the Sierra rising straight off it — Heaton-style minimalism, all negative space and horizon. A quick roadside frame if the light's doing anything.
        directions:
          - label: Light
            value: Any · shoot the flatness
          - label: Glass
            value: Wide, or long to compress crest
          - label: Skip if
            value: You want the Hills before dark
        images:
          - file: owens-wide.webp
            role: wide
            source: wikimedia
            artist: Jengod
            license: CC BY-SA 4.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/4.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Owens_Lake_2023_June_01.jpg
          - file: owens-mood.webp
            role: mood
            source: wikimedia
            artist: Eeekster (Richard Ellis)
            license: CC BY 3.0
            licenseUrl: https://creativecommons.org/licenses/by/3.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Blowing-alkali-dust-Owens-Lake.jpg

      - id: cerrogordo
        name: Cerro Gordo
        optional: true
        when: Only with time to spare · rough climb
        gps:
          lat: 36.5383
          lng: -117.8056
          label: ghost town, 7.7 mi up off CA-136
          elev: 8200
        description: >-
          If you're ahead of schedule and hungry for a real ghost town, **Cerro Gordo** sits 7.7 mi up a rough road off CA-136 above Owens Lake — a gated silver-mining town with few visitors and big views back down over the alkali flat. Only worth it if you've got the time and the stomach for the climb before sunset.
        directions:
          - label: Access
            value: 7.7 mi rough dirt off CA-136 · gated
            warn: true
          - label: Skip if
            value: You're tight on daylight for the Hills
        images:
          - file: cerrogordo-wide.webp
            role: wide
            source: wikimedia
            artist: QKC
            license: CC BY-SA 3.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/3.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Main_street_of_the_silver-mining_ghost_town_of_Cerro_Gordo,_Looking_E_to_mine_dumps_and_Cerro_Gordo_Peak,_Inyo_County,_CA,_USA_-_panoramio.jpg
