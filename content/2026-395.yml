  - theme: Out Through the Basin
    route: Mono Lake → Reno
    summary: >-
      Build the morning around the tufa at dawn, then wander north through high country into Nevada ranch land. Arrive Reno evening. ~140 mi + detours.
    legs:
      - at: sunrise
        text: Mono South Tufa
      - at: opt
        text: Tioga Pass
      - at: midday
        text: Conway Summit
      - at: pm
        text: Bodie
      - at: late
        text: Travertine · Bridgeport
      - at: eve
        text: Reno
    brief:
      - label: Fuel
        icon: "⛽"
        value: Lee Vining & Bridgeport — pricey, top off anyway before Bodie/Tioga.
      - label: Signal
        icon: "📵"
        value: Dead at Bodie and up Tioga; returns near Bridgeport.
      - label: Drive
        icon: "🚗"
        value: ~140 mi to Reno + Bodie detour (adds ~1 hr)
      - label: Finish
        icon: "◆"
        value: >-
          395 N through Gardnerville and Carson City into **Reno** for Sunday evening. If you're chasing one last frame, the high-desert ranch light north of Bridgeport is the sleeper of the whole drive.
    stops:
      - id: mono
        name: Mono Lake — South Tufa
        when: Sunrise · the shot of the trip
        gps:
          lat: 37.9382
          lng: -119.0272
          label: South Tufa parking
          elev: 6380
        description: >-
          The signature Eastern Sierra frame: **tufa spires rising straight out of a still, alien lake** with the desert ranges behind. Build the whole morning around dawn here — colour behind the towers, glassy surface before the wind, the place nearly empty. South Tufa reserve, small fee. Get in position in the dark.
        directions:
          - label: Light
            value: Pre-dawn glow behind towers, E
          - label: Glass
            value: 16–35 for scale · tele to isolate
          - label: Timing
            value: Arrive before first light
            warn: true
        theShot: >-
          Low, one hero tufa anchoring the foreground, cluster behind it, colour band on the horizon reflected in dead-still water. Go before any wind touches the surface.
