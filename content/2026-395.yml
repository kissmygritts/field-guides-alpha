      - id: bodie
        name: Bodie
        badge: +2–3 hrs
        when: Midday · big detour
        gps:
          lat: 38.2124
          lng: -119.0137
          label: townsite, via Hwy 270
          elev: 8375
        description: >-
          The **best-preserved ghost town in the West** — 100+ weathered buildings held in official "arrested decay," a gold-rush town frozen mid-collapse at 8,375 ft. Turn east off US-395 onto Hwy 270; the **last 3 mi are rough dirt** (fine dry, any vehicle). Rusted autos in the sage, the leaning Methodist church, the Standard Mill, interiors left exactly as abandoned. Flat light is no enemy here — it's texture and story, not golden hour. Small day-use fee, cash.
        directions:
          - label: Light
            value: Flat OK · hard sun for wood grain
          - label: Glass
            value: 24–70 + longer to compress; shoot interiors through glass
          - label: Access
            value: 3 mi dirt · fee · 2–3 hr round trip
            warn: true
        theShot: >-
          A rusted Model-A in tall grass with the town behind, or the leaning church against bare hills. Then go close on silvered wood grain and the peeling wallpaper behind wavy window glass.
