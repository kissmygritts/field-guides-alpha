            sourceUrl: https://commons.wikimedia.org/wiki/File:Crowley_Lake_Columns-partially_exposed.jpg

      - id: convict
        name: Convict Lake
        when: Late afternoon
        gps:
          lat: 37.5906
          lng: -118.8564
          label: north-shore day use
          elev: 7850
        description: >-
          Big dramatic peaks dropping straight into water, a short easy drive off 395 — **huge payoff for almost no effort**. Classically a sunrise lake, but golden hour puts warm light on the peaks with the reflection still holding. Walk the north shore for the cleanest mirror.
        directions:
          - label: Light
            value: PM warms peaks · calm = mirror
          - label: Glass
            value: 24–70 · centered symmetry
          - label: Effort
            value: Minimal — roadside + short walk
        theShot: >-
          Dead-center symmetry, waterline on the horizontal third, let the reflection do half the work. Shoot before evening wind ruffles the surface.
        images:
          - file: convict-wide.webp
            role: wide
            source: wikimedia
            artist: MARKroberts
            license: CC BY-SA 3.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/3.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Convict_Lake_CA.jpg
          - file: convict-shot.webp
            role: shot
            source: wikimedia
            artist: Jeffrey Pang from Madison, NJ, USA
            license: CC BY 2.0
            licenseUrl: https://creativecommons.org/licenses/by/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Convict_Lake_Rocks.jpg

      - id: hotcreek
        name: Hot Creek
        badge: geologic site
        when: Midday · geothermal detour
        gps:
          lat: 37.6614
          lng: -118.828
          label: geologic site lot
          elev: 7200
        description: >-
          A geothermal gorge where **cobalt and turquoise hot springs** boil up through a cold trout stream, banked in bleached mineral white and rust. Short paved road off US-395 just south of Mammoth, with an easy overlook and a trail down to the water. The colors punch hardest under **high midday sun** — a rare stop that rewards the flat light you're dodging everywhere else. No swimming: scalding and unpredictable.
        directions:
          - label: Light
            value: High noon makes the blues glow
          - label: Glass
            value: 24–70 + polarizer to cut glare
          - label: Access
            value: Paved to lot — stay out of the water
            warn: true
        theShot: >-
          Shoot down the gorge, turquoise pools leading into the green creek with white mineral banks framing. Polarize to kill surface glare and saturate the blue.
        images:
          - file: hotcreek-shot.webp
            role: shot
            source: wikimedia
            artist: James St. John
            license: CC BY 2.0
            licenseUrl: https://creativecommons.org/licenses/by/2.0
