            licenseUrl: https://creativecommons.org/licenses/by/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Hot_Creek_(Long_Valley_Caldera,_California,_USA)_9.jpg
          - file: hotcreek-detail.webp
            role: detail
            source: wikimedia
            artist: James St. John
