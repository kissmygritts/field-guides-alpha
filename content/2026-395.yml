            licenseUrl: https://creativecommons.org/licenses/by/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Hot_Creek_(Long_Valley_Caldera,_California,_USA)_12.jpg

      - id: june
        name: June Lake Loop
        when: Golden hour → camp
        gps:
          lat: 37.7778
          lng: -119.1289
          label: Silver Lake, June Lake Loop
          elev: 7215
        description: >-
          The "Switzerland of California" — alpine lakes ringed by granite, on a scenic loop off 395. Aspens won't have turned yet this early, but the water, peaks and evening light carry it. Drive the loop, pick a west-facing shoreline, and shoot the last warm light on the crest reflecting off calm water.
        directions:
          - label: Light
            value: Sunset on the crest + reflection
          - label: Glass
            value: 24–70 · foreground rocks help
          - label: Camp
            value: Book ahead — Sat night
            warn: true
        images:
