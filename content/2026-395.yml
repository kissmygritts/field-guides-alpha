            source: wikimedia
            artist: Jeffrey Pang from Berkeley, CA, USA
            license: CC BY 2.0
            licenseUrl: https://creativecommons.org/licenses/by/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Reverse_Mobius_Arch_(3874921460).jpg

  - theme: Climbing the East Side
    route: Lone Pine → June Lake
    summary: >-
      Dawn on the crest, then work north through Bishop into alpine country. Cooler air, bigger water, your reservation night. ~120 mi + detours.
    legs:
      - at: dawn
        text: Alabama Hills
      - at: early
        text: Manzanar
      - at: AM
        text: Bishop · Rowell gallery
      - at: opt
        text: Bristlecones
      - at: PM
        text: Convict · Hot Creek
      - at: golden
        text: June Lake
    brief:
      - label: Fuel
        icon: "⛽"
        value: Bishop (cheapest on the route) and Mammoth.
      - label: Signal
        icon: "📵"
        value: Solid in Bishop/Mammoth; dead on the Bristlecone & Crowley dirt.
      - label: Altitude
        icon: "🏔"
        value: Up to 10,000 ft at the bristlecones — pace yourself, layer up.
      - label: Drive
        icon: "🚗"
        value: ~120 mi + detours
      - label: Camp
        icon: "▲"
        value: >-
          **June Lake Loop** (Oh! Ridge, June Lake, Silver, Gull) or Mammoth-area FS campgrounds. This is your **one competitive night** — a summer Saturday, these fill. Reserve early or have a dispersed national-forest backup pinned before you arrive.
    stops:
      - id: manzanar
        name: Manzanar
        badge: historic site
        when: Early morning · reflective stop
        gps:
          lat: 36.7283
          lng: -118.1547
          label: auto-tour entrance
          elev: 3900
        description: >-
          The WWII camp where the U.S. incarcerated over 10,000 Japanese-Americans — a **National Historic Site** right on US-395 between Lone Pine and Independence. Not a "shot" so much as a place you stop: the stone sentry posts and entrance sign, a reconstructed guard tower and barracks, the white cemetery monument standing against the Sierra wall. Drive the 3.2-mi auto tour; the museum in the old auditorium is worth an hour. **Free.**
        directions:
          - label: Light
            value: Flat AM is fine — it's about content
          - label: Glass
            value: 35 / 50 · documentary, restrained
          - label: Time
            value: 45–90 min incl. museum
        theShot: >-
          The guard tower against the crest, or a stone sentry post framing the empty valley. Let it be quiet — restraint over drama does this place justice.
        images:
          - file: manzanar-wide.webp
            role: wide
            source: wikimedia
            artist: GFred1
            license: CC BY-SA 4.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/4.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Entrance_gate_-_Manzanar_National_Historic_site.jpg
          - file: manzanar-shot.webp
            role: shot
            source: wikimedia
            artist: GFred1
            license: CC BY-SA 4.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/4.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Guard_tower_-_Manzanar_National_Historic_Site.jpg
          - file: manzanar-mood.webp
            role: mood
            source: wikimedia
            artist: claralieu
            license: CC BY 2.0
            licenseUrl: https://creativecommons.org/licenses/by/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Manzanar_001.jpg

      - id: bristlecone
        name: Ancient Bristlecone Pines
        badge: +2–3 hrs
        optional: true
        when: Morning · big detour
        gps:
          lat: 37.3847
          lng: -118.1717
          label: Schulman Grove visitor ctr
          elev: 10000
        description: >-
          East of Bishop, a long climb to ~10,000 ft and the **oldest trees on earth** — twisted, sculptural, silver-and-amber against high desert. A Heaton patient-landscape subject, and cool even in summer thanks to the elevation. It's a committed out-and-back; make it a pace call. Before you leave Bishop, duck into the **Mountain Light Gallery** — Galen Rowell's life work of this exact landscape, and the best possible tuning-fork for your eye.
        directions:
          - label: Light
            value: Low sun rakes the grain; storms are a gift
          - label: Glass
            value: 35–85 · isolate one tree's form
          - label: Cost
            value: Half a day round-trip
            warn: true
        theShot: >-
          One tree, backlit, against clean sky or a dark distant range. Let the dead silver wood and living needles fight in the same frame. Sidelight for the grain.
        images:
          - file: bristlecone-shot.webp
            role: shot
            source: wikimedia
            artist: Dcrjsr
            license: CC BY-SA 3.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/3.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Big_bristlecone_pine_Pinus_longaeva.jpg
          - file: bristlecone-wide.webp
            role: wide
            source: wikimedia
            artist: Z3lvs
            license: CC0
            licenseUrl: http://creativecommons.org/publicdomain/zero/1.0/deed.en
            sourceUrl: https://commons.wikimedia.org/wiki/File:Ancient_Bristlecone_Pine_Forest_04_30_2022_30.jpg

      - id: crowley
        name: Crowley Lake Columns
        badge: conditions
        optional: true
        when: Midday bonus
        gps:
          lat: 37.5686
          lng: -118.7258
          label: columns, SE shore
          elev: 6780
        description: >-
          Strange eroded stone columns along the shoreline — a lesser-known, very graphic subject. Access can involve a dirt road and it depends on **lake level**, so treat it as a bonus if conditions cooperate. Rewards a longer lens and repetition.
        directions:
          - label: Light
            value: Raking sun into the arches
          - label: Glass
            value: 50–135 · pattern & repetition
          - label: Depends
            value: Lake level + dirt access
            warn: true
        images:
          - file: crowley-shot.webp
            role: shot
            source: wikimedia
            artist: Andrew Kearns
            license: CC BY 2.0
            licenseUrl: https://creativecommons.org/licenses/by/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Columns_at_Crowley_Lake_California.jpg
          - file: crowley-wide.webp
