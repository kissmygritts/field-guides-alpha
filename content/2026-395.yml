      - id: travertine
        name: Travertine Hot Springs
        badge: Bridgeport
        when: Afternoon · last frame
        gps:
          lat: 38.2489
          lng: -119.2047
          label: BLM pools, S of Bridgeport
          elev: 6500
        description: >-
          Just outside Bridgeport — a BLM site of terraced mineral pools, turquoise water banked in warm orange travertine with the **Sierra as backdrop**. Good closing landscape (and a soak if you want one). North of here 395 opens into Nevada ranch country — Bridgeport valley and the Walker River canyon give you big Carver-style open compositions if the light holds.
        directions:
          - label: Light
            value: Afternoon warms the terraces
          - label: Glass
            value: 24–70 · pools as lead-in lines
          - label: Also
            value: Conway Summit vista en route
        theShot: >-
          Use a turquoise pool as foreground, its edge as a leading line pointing back at the snow-flecked crest. Late light makes the mineral terraces glow.
