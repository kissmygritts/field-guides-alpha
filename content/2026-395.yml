            sourceUrl: https://commons.wikimedia.org/wiki/File:Cerro_Gordo_ghost_town,_Keeler,_California,_US_(5412117469).jpg

      - id: alabama
        name: Alabama Hills
        when: Golden hour → camp
        gps:
          lat: 36.6046
          lng: -118.1206
          label: Mobius Arch, off Movie Rd
          elev: 4800
        description: >-
          The payoff. Rounded granite boulders and natural arches with **Mt. Whitney and the Sierra crest** behind — one of the most-shot spots on the whole route, and it earns it. **Mobius Arch** is the classic (short walk from the Movie Rd trailhead) — it frames Whitney through the opening. Scout compositions in the good light, sleep here, shoot it again at dawn.
        directions:
          - label: Light
            value: Sunset warms boulders; dawn = alpenglow on crest
          - label: Glass
            value: 16–35 for arch foreground · tele for crest
          - label: Camp
            value: Free dispersed on Movie Rd
        theShot: >-
          Mobius Arch low and close, wide lens, Whitney centered in the opening. Sunset for warm granite; set an alarm and come back for pink alpenglow at first light.
        images:
          - file: alabama-shot.webp
            role: shot
            source: wikimedia
            artist: Clyde Charles Brown
            license: CC BY-SA 4.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/4.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Mobius_Arch_in_Alabama_Hills,_California,_US.jpg
          - file: alabama-wide.webp
