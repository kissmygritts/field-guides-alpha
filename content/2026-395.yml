      - id: tioga
        name: Tioga Pass spur
        badge: out-and-back
        optional: true
        when: Morning detour · open in summer
        gps:
          lat: 37.9357
          lng: -119.234
          label: Ellery Lake, Tioga Rd
          elev: 9500
        description: >-
          From Lee Vining, Tioga Rd climbs to California's highest highway pass past **Ellery and Tioga Lakes** — crazy granite, deep teal alpine water. You don't need to enter Yosemite; just drive up to the lakes and back for a stunning hour. It eats into your Reno arrival, so gauge it against how the morning ran.
        directions:
          - label: Light
            value: Mid-morning is fine up high
          - label: Glass
            value: 24–70 · roadside pullouts
          - label: Cost
            value: 1–2 hrs round trip
        images:
