      - id: kelsodepot
        name: Kelso Depot
        badge: 1924 · restored
        when: Midday · roadside
        gps:
          lat: 35.0114
          lng: -115.6534
          label: Kelso Depot, Kelbaker Rd
          elev: 2126
        description: >-
          A gleaming white **Spanish-mission railroad depot** marooned in the middle of the desert — red-tile roof, arcaded veranda, built 1924 for the Union Pacific and now the Preserve's visitor center. Palms, a long empty platform, freight trains still grinding past on the mainline. Pure Americana: architectural symmetry against raw desert, the Providence Mountains behind. Works even under flat midday light — you're shooting the building, not the sky.
        directions:
          - label: Light
            value: Front light on the white facade AM · warm side-light PM
          - label: Glass
            value: 24–70 · symmetry, arches, receding veranda
          - label: Access
            value: Paved (Kelbaker Rd) — any car
        theShot: >-
          The depot dead-on and symmetrical, palms framing, red tile against blue. Then the arcade receding down the veranda in hard shadow — and hold for a freight stack blurring past behind it.
        images:
