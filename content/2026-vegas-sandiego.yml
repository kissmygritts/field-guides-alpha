      - id: roys
        name: Roy's Motel & Café
        badge: the sign
        when: Dusk · blue hour
        gps:
          lat: 34.5583
          lng: -115.7442
          label: Roy's, Amboy · Route 66
          elev: 640
        description: >-
          The great googie boomerang sign of **Roy's** — Amboy's 1950s Route 66 outpost, population near zero, the most photographed neon in the Mojave. The soaring pylon, the shuttered café, a rusted gas pump, and the dead-straight Mother Road running off to a vanishing point. They relight the neon on occasion; even dark, the sign against a blue-hour or star-filled sky is the frame. This is your last stop before the run down Amboy Road to Twentynine Palms.
        directions:
          - label: Light
            value: Blue hour into full dark · neon or stars behind the pylon
          - label: Glass
            value: 24–70 + wide · tripod for the dark frames
          - label: Access
            value: Paved, right on Route 66
        theShot: >-
          The boomerang pylon dead-center against a deep post-sunset blue, Route 66 leading straight to it. Later, if it's dark and clear, the sign silhouetted under stars. A rusted pump detail for the diptych.
