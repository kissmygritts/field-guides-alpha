      - id: sunrise
        name: Sunrise Highway
        badge: Mt. Laguna
        when: After dark · the descent
        gps:
          lat: 32.8785
          lng: -116.4247
          label: Sunrise Hwy (S-1), Mt. Laguna
          elev: 5980
        description: >-
          The last act. County **S-1** runs the crest of the Laguna Mountains at 5,000–6,000 ft through Jeffrey pine and black oak, the east side dropping in sheer overlooks straight down to the Anza-Borrego desert you just crossed. In daylight the Desert View and Stephenson Peak pullouts are staggering; by the time you reach them it may be full dark — so make it your dark-sky window. The crescent moon has set, and the desert glitters far below before the long coast down into San Diego and the city lights.
        directions:
          - label: Light
            value: Overlooks at last light · then stars over the desert rim
          - label: Glass
            value: 24–70 · tripod for the dark descent + any night frame
          - label: Access
            value: Paved (S-1) · genuinely cold at 6,000 ft after dark
            warn: true
        theShot: >-
          If you catch last light: the pine ridge dropping thousands of feet to the desert floor, backlit. After dark: a long exposure of stars and distant desert lights from a pullout, pines framing — then the switchbacks down to the coast.
