      - id: montezuma
        name: Montezuma Grade
        badge: S-22 climb
        optional: true
        when: Golden hour · on the climb
        gps:
          lat: 33.2447
          lng: -116.4033
          label: Crawford Overlook, S-22
          elev: 3000
        description: >-
          The road out of the basin. County **S-22** claws 3,000 feet up from the Borrego floor to Ranchita in a run of switchbacks, and the pullouts near the top — the **Crawford Overlook** especially — open onto the whole Borrego Valley, its badlands, and the Salton Sea beyond. It's at its best when the setting sun sidelights the ridges and the valley floods with blue shadow. Time your climb for golden hour and stop at the rail.
        directions:
          - label: Light
            value: Sunset — valley in warm side-light, shadows pooling
          - label: Glass
            value: 24–70 · tele to compress the ridgelines into layers
          - label: Access
            value: Paved (S-22) · paved pullouts — any car
        theShot: >-
          From the overlook, the switchback road threading down into the vast valley, low sun raking the floor, the distant Salton Sea catching the last light. Or a tele compression of ridgelines going blue with haze.
