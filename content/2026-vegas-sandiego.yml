  - theme: Badlands to the Pines
    route: 29 Palms → Anza-Borrego → San Diego
    summary: >-
      The long day. Traverse Joshua Tree at dawn, take the one unavoidable freeway hop, then drop into the Anza-Borrego badlands — a Grand-Canyon overlook and a slot canyon — before climbing the switchbacks to apple-pie Julian and running the pine crest down into San Diego after dark. ~250 mi.
    legs:
      - at: dawn
        text: Joshua Tree traverse
      - at: "—"
        text: brief I-10 hop
      - at: midday
        text: The Slot
      - at: pm
        text: Font's Point
      - at: golden
        text: Montezuma Grade
      - at: dusk
        text: Julian
      - at: dark
        text: Sunrise Hwy → San Diego
    brief:
      - label: Fuel
        icon: "⛽"
        value: Fill in Twentynine Palms before the park; then Chiriaco Summit / Indio on I-10. Borrego Springs and Julian both have gas.
      - label: Signal
        icon: "📵"
        value: Dead in Joshua Tree and across Anza-Borrego; returns on I-10 and in Julian.
      - label: Heat → Cold
        icon: "🏜"
        value: Anza-Borrego's floor bakes past 90°F midday; Julian and Mt. Laguna sit at 4,000–6,000 ft and turn cold after dark — pack a real layer.
      - label: Drive
        icon: "🚗"
        value: ~250 mi · one ~35-mi stint on I-10 is the only freeway · plan the whole day
      - label: Finish
        icon: "◆"
        value: >-
          S-1 down off the mountains to I-8, then west into **San Diego** for Sunday night — arriving well after dark, salt air finally replacing desert dust. Roughly 600 miles and two golden days out of Las Vegas, and you barely touched a freeway the whole way.
    stops:
      - id: joshuatree
        name: Joshua Tree
        badge: north → south traverse
        optional: true
        when: Dawn · traverse
        gps:
          lat: 33.7442
          lng: -115.9267
          label: Cholla Garden, Pinto Basin Rd
          elev: 2250
        description: >-
          Enter at Twentynine Palms and drive the park's spine south to Cottonwood — the fastest low-road link toward the coast, and a worthy first frame either way. Up high: the namesake trees and monzogranite jumbles around **Jumbo Rocks** and Skull Rock. Dropping into the Pinto Basin, the **Cholla Cactus Garden** lights up like fur when low sun backlights ten thousand spines. Shoot the cholla at first light, grab the rocks on the way through, then keep moving — the day is long.
        directions:
          - label: Light
            value: First light backlighting the cholla · long shadows in the rocks
          - label: Glass
            value: 24–70 · macro / tele for cholla halos
          - label: Access
            value: Paved park road end-to-end · entrance fee
        theShot: >-
          The Cholla Garden backlit at sunrise, every spine a halo, one plant isolated against shadowed hills. Up in the rocks: a Joshua tree against a granite pile, hard dawn shadow raking across.
        images:
          - file: joshuatree-shot.webp
            role: shot
            source: wikimedia
            artist: MistyEyedKid
            license: CC BY 4.0
            licenseUrl: https://creativecommons.org/licenses/by/4.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:A_field_of_Cholla_reach_for_the_western_skies_of_California.jpg
          - file: joshuatree-wide.webp
            role: wide
            source: wikimedia
            artist: David Balmer
            license: CC BY 3.0
            licenseUrl: https://creativecommons.org/licenses/by/3.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Cholla_Cactus_Garden_1_-_panoramio.jpg
          - file: joshuatree-detail.webp
            role: detail
            source: wikimedia
            artist: NPS Photo
            license: Public domain
            sourceUrl: https://commons.wikimedia.org/wiki/File:Be_careful_when_walking_around_in_the_park,_especially_at_the_Cholla_Cactus_Garden._Cholla_often_drop_very_sharp_balls_that_can_(80cd7f32-4c27-4b35-89fa-bbbad2b8f4c7).jpg
          - file: joshuatree-mood.webp
            role: mood
            source: wikimedia
