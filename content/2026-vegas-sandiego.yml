      - id: kelsodunes
        name: Kelso Dunes
        when: Afternoon → golden hour
        gps:
          lat: 34.8925
          lng: -115.7108
          label: Kelso Dunes TH, off Kelbaker Rd
          elev: 2650
        description: >-
          Six hundred feet of rose-gold sand piled into one of the tallest dune fields in the Mojave — and when you slide down the steep lee faces they **boom**, a low aircraft-engine drone from the shearing sand. A short walk off the trailhead puts you onto clean, unfootprinted ridgelines. This is your pure-form chapter: line, shadow, ripple, nothing else. Save it for the last hour, when raking light cuts the crests into knife-edges.
        directions:
          - label: Light
            value: Last hour — raking light for ridgelines & ripples
          - label: Glass
            value: 70–200 to compress crests · wide for the sweep
          - label: Access
            value: Graded dirt to TH + ~1.5 mi soft-sand walk
            warn: true
        theShot: >-
          A single sinuous crest dividing light from shadow, wind ripples leading in, not a footprint in frame. Go long to stack ridge on ridge; wait out the last low sun for the deepest shadow.
