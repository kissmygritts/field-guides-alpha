      - id: julian
        name: Julian
        badge: mountain town
        when: Dusk · blue hour
        gps:
          lat: 33.0786
          lng: -116.6019
          label: Main St, Julian
          elev: 4235
        description: >-
          A gold-rush mountain town gone to apples and pie, at **4,235 ft** in the Cuyamacas — false-front main street, wood boardwalks, cider mills, pine air. Mid-October is peak apple season, so it'll be busy and golden: warm-lit windows, string lights, woodsmoke at dusk. A complete change of key from the desert two hours behind you. Shoot the main street at blue hour, when the storefronts glow against the deepening sky.
        directions:
          - label: Light
            value: Blue hour — lit storefronts against deep sky
          - label: Glass
            value: 35 / 50 · signage, warm windows, boardwalk detail
          - label: Access
            value: Paved (CA-78/79) — any car · busy in fall
        theShot: >-
          Main Street at blue hour: warm false-front stores, a hand-painted or neon sign, string lights overhead. Put a slice of pie in the frame if you want the cliché — at this point you've earned it.
