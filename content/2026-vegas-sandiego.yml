# 2026-vegas-sandiego — migrated from guides/2026-vegas-sandiego/config.json
# (structure) + hand-ported prose.
#
# STRUCTURE (moon, darkSites, gps, day/stop membership, elev→number, alt promotion)
# was generated from guides/2026-vegas-sandiego/config.json with:
#     node build/config-to-yml.mjs 2026-vegas-sandiego
# Two alts are promoted to sibling optional stops: Cima Dome summit (cima-alt) and
# Jumbo Rocks · Skull Rock (joshuatree-alt). This guide has no `feed` key.
# PROSE (masthead, descriptions, directions, theShot, day themes/briefs/legs,
# fieldNotes, colophon) is hand-ported from guides/2026-vegas-sandiego/content.html
# — the copy IS the product (non-negotiable #4). The SVG stop-visual placeholders
# are dropped; galleries come from finalize (public/guides/<slug>/ + images: below).
masthead:
  eyebrow: Shooting Script · Overland · Mid-October
  title: Las Vegas to San Diego, the *back way*
  dek: >-
    Two days southwest that barely touch a freeway. Skip I-15 entirely: drop down US-95 into the volcanic heart of the Mojave National Preserve, run a forgotten stretch of Route 66, cross the badlands of Anza-Borrego, then climb the pine crest above San Diego and coast down after dark. Built around the ends of the day, with dark desert nights between.
  meta:
    - ~600 mi total
    - 2 nights · Preserve + 29 Palms
    - Depart Fri PM
    - Route no I-15
    - Waxing-crescent moon · dark late
  # Saturday is the first full shooting day (Fri-evening departure) — drives the
  # derived "Day N · Weekday" labels (Sat, Sun).
  startDate: 2026-10-17

moon:
  start: 2026-10-16
  end: 2026-10-18

darkSites: Mojave Preserve (Kelso, Hole-in-the-Wall), Amboy on Route 66, and Anza-Borrego

days:
  - theme: Preserve & Route 66
    route: Vegas → Amboy → Twentynine Palms
    summary: >-
      Slip out of Vegas Friday night, camp in the Mojave Preserve, and spend Saturday working its volcanic middle — a granite dome, a red-rock slot, a mission depot, booming dunes — then drop onto Route 66 for a cinder cone and the loneliest neon in California. ~230 mi.
    legs:
      - at: Fri PM
        text: depart Vegas · US-95 S
      - at: dawn
        text: Cima Dome
      - at: AM
        text: Hole-in-the-Wall
      - at: midday
        text: Kelso Depot + Dunes
      - at: pm
        text: Amboy Crater
      - at: dusk
        text: Roy's → 29 Palms
    brief:
      - label: Fuel
        icon: "⛽"
        value: Fill up in Las Vegas — the Preserve has no gas at all. Next reliable pumps are Baker or Ludlow, then Twentynine Palms.
      - label: Signal
        icon: "📵"
        value: Dead across the entire Preserve and Route 66. Download maps + this guide before you leave Vegas.
      - label: Water
        icon: "💧"
        value: Carry 6+ L each — no potable water at any Preserve stop, and October still hits ~90°F midday on the low flats.
      - label: Drive
        icon: "🚗"
        value: ~230 mi · much of it graded dirt · 5–6 hr moving + stops
      - label: Camp
        icon: "▲"
        value: >-
          Overnight **Twentynine Palms** (motels + the Joshua Tree gateway), or dispersed on Amboy Road / back in the Preserve if you'd rather stay under stars. Fuel up and eat before you turn in — Sunday is the long day. The crescent moon sets early, so if it's clear, walk out from Roy's sign for stars before you go.
    stops:
      - id: cima
        name: Cima Dome & Teutonia Peak
        badge: Mojave Preserve
        optional: true
        when: Dawn · first frame
        gps:
          lat: 35.2717
          lng: -115.5407
          label: Teutonia Peak TH, Cima Rd
          elev: 5220
        description: >-
          A near-perfect granite dome — 75 square miles of it, rising so symmetrically it reads as almost engineered — with the boulder-stacked Teutonia Peak trail picking through what was the world's densest **Joshua-tree forest**. Honest note: the 2020 **Dome Fire** burned much of that forest, so today you're shooting survivors and silvered snags among the monzogranite, not the endless green army it was. Still a quiet, strange place to open the trip. Low sun rakes the boulders and backlights the Joshuas that made it.
        directions:
          - label: Light
            value: First light · low sun backlighting the Joshuas
          - label: Glass
            value: 24–70 · wide to set the dome's curve
          - label: Access
            value: Paved Cima Rd + short trail · fire-scarred
        theShot: >-
          A lone surviving Joshua tree rim-lit at sunrise, stacked granite boulders behind it, the dome's clean arc on the horizon. Then a stark minimal — a single burned snag against boulder and sky.
