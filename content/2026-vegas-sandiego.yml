      - id: amboycrater
        name: Amboy Crater
        badge: Route 66
        when: Late afternoon
        gps:
          lat: 34.5486
          lng: -115.7864
          label: Amboy Crater, Route 66
          elev: 980
        description: >-
          A textbook **250-ft cinder cone** sitting alone on a black lava field beside Route 66, last erupted maybe 10,000 years ago. A trail crosses the basalt to a breach in the west wall and climbs to the rim; all around, the flow is a dead-flat sea of black rock. Shoot it late — low sun models the cone's symmetry and throws the lava field into long shadow. Midday here is brutal and flat, so don't waste that light on it.
        directions:
          - label: Light
            value: Late afternoon models the cone · skip midday
          - label: Glass
            value: 24–70 · wide for the lava sea, tele to isolate the cone
          - label: Access
            value: Paved lot off Route 66 + exposed lava trail
            warn: true
        theShot: >-
          The symmetrical cone across the black flow, warm rim-light, a thread of trail leading in for scale. Then get low and shoot the cracked basalt into the sun for texture and a sun-star.
