            sourceUrl: https://commons.wikimedia.org/wiki/File:Cholla_Cactus_Garden_(12.2010)_-_panoramio.jpg

      - id: joshuatree-alt
        name: Jumbo Rocks · Skull Rock
        optional: true
        when: On the traverse · quick stop
        gps:
          lat: 33.9944
          lng: -116.0636
          label: Jumbo Rocks, upper park road
          elev: 4400
        description: >-
          The monzogranite heart of the park's high country — piled boulder domes around **Jumbo Rocks** and the eroded hollows of **Skull Rock**, right off the road on the way south. Hard dawn shadow rakes across the granite; grab it in passing before you drop to the cholla.

      - id: theslot
        name: The Slot
        badge: Anza-Borrego
        when: Midday · flat-light friendly
        gps:
          lat: 33.2189
          lng: -116.147
          label: The Slot, Borrego Mtn
          elev: 780
        description: >-
          A narrow sandstone slot you walk down into — walls pinching to shoulder-width overhead, a natural **rock bridge** spanning the gap, soft light bouncing down sculpted mudstone. Unlike the badland overlooks, a slot shoots **best under flat midday sun**, when top light filters down without blowing the rim — so this is the stop to drop into when you roll in around noon. Short, easy, out of the wind, and completely unlike anything else on the drive.
        directions:
          - label: Light
            value: Midday soft top-light is ideal · avoid hard low sun
          - label: Glass
            value: 16–35, vertical · the walls do the composing
          - label: Access
            value: Sandy access road + short walk · never in flash-flood weather
            warn: true
        theShot: >-
          Vertical, looking up the pinched walls to a ribbon of sky, the rock bridge crossing overhead. Then a tight study of the wind-carved flutes where the bounced light goes warm.
        images:
          - file: theslot-shot.webp
            role: shot
            source: wikimedia
            artist: Chris Hunkeler from Carlsbad, California, USA
            license: CC BY-SA 2.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Slot_Middle_(33433272594).jpg
          - file: theslot-wide.webp
            role: wide
            source: wikimedia
            artist: Chris Hunkeler from Carlsbad, California, USA
            license: CC BY-SA 2.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Slot_Top_(33433279884).jpg

      - id: fontspoint
        name: Font's Point
        badge: Anza-Borrego
        when: Late afternoon · raking light
        gps:
          lat: 33.2766
          lng: -116.2803
          label: Font's Point, wash off S-22
          elev: 1290
        description: >-
          "California's Grand Canyon" — an abrupt cliff-edge over the Borrego Badlands, a chaos of eroded mudstone ridges and washes falling away toward the Salton basin. Raw and enormous. Low, raking light carves the badland fins into three dimensions; harsh overhead sun flattens them to mush — so if you got here midday, do The Slot first and circle back for the **late side-light**. The four miles in are a soft-sand wash: air down, 4WD advised, and don't attempt it if rain threatens.
        directions:
          - label: Light
            value: Sunset (or sunrise) rakes the ridges · midday kills it
          - label: Glass
            value: 24–70 wide at the rim · tele to isolate the fins
          - label: Access
            value: 4 mi soft-sand wash · high-clearance 4WD, air down
            warn: true
        theShot: >-
          Standing at the rim, wide, the whole badland maze raking away in low side-light. Then go long and pull single eroded fins out of the chaos, layer stacked on layer.
