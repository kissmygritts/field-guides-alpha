      - id: cima-alt
        name: Cima Dome summit
        optional: true
        when: Extra · boulder scramble
        gps:
          lat: 35.3003
          lng: -115.525
          label: high point above the Teutonia Peak trail
          elev: 5745
        description: >-
          The high point above the Teutonia Peak trail — a short boulder scramble up onto the crown of the dome for the widest read of its arc and the burned Joshua forest below. A worthwhile add-on if the dawn light holds.

      - id: holeinthewall
        name: Hole-in-the-Wall
        when: Morning
        gps:
          lat: 35.0458
          lng: -115.3931
          label: Hole-in-the-Wall, Black Canyon Rd
          elev: 4270
        description: >-
          Rust-red volcanic rock pocked with hundreds of wind-and-gas hollows — debris from a violent eruption 18 million years ago. The **Rings Trail** drops you down through a slot in the rhyolite on iron rings bolted to the stone, walls closing overhead into **Banshee Canyon**. The oxidized tuff glows when low sun hits it. One of the Preserve's most graphic, texture-dense stops — Swiss-cheese walls from every angle.
        directions:
          - label: Light
            value: Low sun ignites the red rock · flat is fine for the pockets
          - label: Glass
            value: 16–35 in the slot · 70–200 for wall texture
          - label: Access
            value: Graded dirt (Black Canyon Rd) + ring scramble
        theShot: >-
          Down inside Banshee Canyon: pocked red walls curving around you, the iron rings or a figure for scale. Then tight abstracts of the tafoni — pockets within pockets, warm on cool.
        images:
          - file: holeinthewall-wide.webp
            role: wide
            source: wikimedia
            artist: Stan Shebs
            license: CC BY-SA 3.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/3.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Mojave_Preserve_Wildhorse_Canyon_2.jpg
          - file: holeinthewall-detail.webp
            role: detail
            source: wikimedia
