      - id: carforest
        name: Int'l Car Forest of the Last Church
        badge: free · open
        when: Morning · quick & strange
        gps:
          lat: 37.7047
          lng: -117.2478
          label: Crystal Ave, W edge of Goldfield
          elev: 5700
        description: >-
          On the scrub at the west edge of Goldfield — **40+ cars, buses and a limo planted nose-down and stacked into towers**, every panel covered in spray-paint art. Cadillac Ranch by way of Mad Max. Free, always open, a graded-dirt lot — walk right in among them. Wild in any light; golden hour sets the paint and rust glowing, and it'd be eerie under the full moon if you're still nearby after dark.
        directions:
          - label: Light
            value: Golden hour on the paint · harsh sun works too
          - label: Glass
            value: 16–35 · get in among them, shoot up
          - label: Access
            value: Short graded dirt — fine dry · pack out trash
            warn: true
        theShot: >-
          Low and wide beneath a planted car so it looms against sky, graffiti reading edge-to-edge. Then a tight abstract of peeling paint on rusted steel. Sun-star behind a tower at golden hour.
