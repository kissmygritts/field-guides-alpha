      - id: rhyolite
        name: Rhyolite & Goldwell
        badge: the marquee
        when: Late afternoon → sunset
        gps:
          lat: 36.9019
          lng: -116.8281
          label: townsite off NV-374
          elev: 3796
        description: >-
          The payoff. A 1900s boomtown that emptied almost as fast as it filled, just off NV-374 near Beatty — the three-story **Cook Bank** shell, the glass-walled **Bottle House**, the old train depot standing alone in the flats. At the entrance, the **Goldwell Open Air Museum** — a cluster of ghostly white plaster figures ("The Last Supper") staring out over the desert. Sunset warms the ruins; then the ghosts glow under the full moon.
        directions:
          - label: Light
            value: Sunset on the ruins · moonlight on the white figures
          - label: Glass
            value: 24–70 + wide · foreground ghost, ruin behind
          - label: Access
            value: Paved to both · free · open dusk-to-dawn
        theShot: >-
          Cook Bank's empty windows against a burning sky, low sun through the openings. Then a shrouded Goldwell figure close and low at blue hour, ruin or moon behind it. Come back after full dark for the plaster to go luminous.
