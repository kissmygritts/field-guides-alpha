      - id: hawthorne
        name: Hawthorne Army Depot
        badge: shoot from the road
        optional: true
        when: Afternoon · roadside only
        gps:
          lat: 38.5847
          lng: -118.65
          label: bunker field, US-95 N of town
          elev: 4320
        description: >-
          The world's largest ammunition depot — **thousands of turf-covered concrete bunkers** in a dead-flat grid, marching to the horizon on both sides of US-95. Utterly surreal, endlessly graphic, and free from the car window. **It's an active military base — do not enter or approach the fence.** Everything you want is a compression shot from public road shoulders. High flat light actually helps the repetition read.
        directions:
          - label: Light
            value: Flat is fine · low sun rakes the mounds
          - label: Glass
            value: 70–200 · compress the grid into pattern
          - label: Access
            value: Roadside only — no entry, active base
            warn: true
        theShot: >-
          Long lens straight down a row so the igloos stack into an infinite repeating rhythm. Keep a lone bunker off-center to break the grid. No fences, no signage in frame.
        images:
          - file: hawthorne-wide.webp
            role: wide
            source: wikimedia
            artist: Ken Lund from Reno, Nevada, USA
            license: CC BY-SA 2.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Ammunition_Bunkers,_Hawthorne_Army_Depot,_Hawthorne,_Nevada_(15517175898).jpg
