      - id: ashmeadows
        name: Ash Meadows
        badge: wildlife refuge
        when: Afternoon · last frame
        gps:
          lat: 36.4406
          lng: -116.3306
          label: Crystal Reservoir / visitor ctr
          elev: 2190
        description: >-
          An improbable **desert oasis** in the Amargosa hardpan near the California line — **turquoise spring pools** so clear they look tropical, fed by fossil water, with boardwalks over them and the Funeral Mountains behind. Crystal Reservoir mirrors the ranges; **Devils Hole** (the fenced blue slot that's home to one tiny endangered fish) is a short drive on. A cool, saturated closer before the run into Vegas. Midday high sun makes the blues glow.
        directions:
          - label: Light
            value: High sun saturates the spring blue · calm = reflection
          - label: Glass
            value: 24–70 + polarizer · boardwalks as lead-in lines
          - label: Access
            value: Some graded-dirt refuge roads — fine dry · stay on boardwalks
            warn: true
        theShot: >-
          Shoot down into a spring, turquoise water against pale desert, a boardwalk edge leading in. Polarize to cut surface glare and push the blue. At Crystal Reservoir, center the ridge on its own reflection.
        images:
          - file: ashmeadows-shot.webp
            role: shot
            source: wikimedia
            artist: Stan Shebs
            license: CC BY-SA 3.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/3.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Ash_Meadows_Crystal_Reservoir_2.jpg
          - file: ashmeadows-wide.webp
            role: wide
            source: wikimedia
            artist: Stan Shebs
