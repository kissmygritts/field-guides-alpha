      - id: rhyolite-alt
        name: Goldwell Open Air Museum
        optional: true
        when: Blue hour → moonlit
        gps:
          lat: 36.8992
          lng: -116.83
          label: at the Rhyolite entrance, off NV-374
          elev: 3780
        description: >-
          The open-air sculpture park at the Rhyolite turnoff — Charles Albert Szukalski's ghostly white plaster **"Last Supper"** figures and a towering cinderblock *Venus*, out on the open desert. Best at blue hour and under the full moon, when the plaster goes luminous.

      - id: zabriskie
        name: Zabriskie Point
        badge: Death Valley
        optional: true
        when: Dawn only · big detour
        gps:
          lat: 36.42
          lng: -116.8113
          label: Zabriskie Point, CA-190
          elev: 710
        description: >-
          If you overnight in Beatty instead and can make a dawn run, Death Valley's most famous overlook is ~30 min west on NV-374/CA-190 — **rippling golden badlands** below the sharp spine of Manly Beacon, the whole basin catching first light. It's a classic for a reason. **The catch is heat** — late September still routinely hits 100°F+ by mid-morning here, so this is a get-in-at-sunrise-and-leave stop, not a midday one.
        directions:
          - label: Light
            value: Sunrise only — first light sets the badlands glowing
          - label: Glass
            value: 24–70 + tele to isolate the eroded ridgelines
          - label: Heat
            value: 100°F+ by mid-AM · dawn dash, carry water
            warn: true
        theShot: >-
          Manly Beacon lit warm against the shadowed folds below, sun just cresting. Go long to pull out the erosion patterns, or wide to set the ridge into the whole basin. Be gone before the heat.
        images:
          - file: zabriskie-shot.webp
            role: shot
            source: unsplash
            artist: john ko
            license: Unsplash License
            licenseUrl: https://unsplash.com/license
