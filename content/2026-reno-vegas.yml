      - id: ashmeadows-alt
        name: Devils Hole
        optional: true
        when: Detour · midday
        gps:
          lat: 36.4253
          lng: -116.2911
          label: detached Death Valley NP unit, E of the refuge
          elev: 2360
        description: >-
          A fenced, water-filled limestone cavern — a detached unit of Death Valley National Park and the entire world range of the **Devils Hole pupfish**. You shoot it through the fence — deep blue water in pale rock, warning signs, a viewing platform. A strange, saturated coda a short drive east of the refuge.

fieldNotes:
  - heading: Full moon, not dark skies
    body: >-
      Late Sept 2026 lands on a **full moon (Sep 26)**, not the new moon — so this isn't a Milky-Way trip. Lean into it — moonlit ghost towns, silvered mine timbers and desert lit like day. If the core is the goal, shift **~2 weeks earlier or ~1 week later** and the same route goes properly dark.
  - heading: Fuel & signal
    body: >-
      US-95 is genuinely empty. Top off at **Fallon, Hawthorne, Tonopah and Beatty** — long legs between, and no cell signal across most of it. Download maps and this guide before you leave pavement you know.
  - heading: Heat by latitude
    body: >-
      The northern half is mild and the Tonopah night is **cold at 6,000 ft** — bring a warm layer. The southern low stops (Death Valley, Ash Meadows) still **bake past 100°F**; shoot them early and carry more water than you think.
  - heading: Ghost-town etiquette
    body: >-
      Rhyolite and Goldfield are fragile and partly private — **no trespassing, take nothing**. Rhyolite is BLM "arrested decay." The Car Forest is free and open but has no services — **pack everything out**.
  - heading: Hawthorne is an active base
    body: >-
      The bunker field is stunning but it's a live **Army depot**. Shoot only from public road shoulders — **no entering, no approaching the fence**, and keep gates and signage out of frame.
  - heading: Rhythm
    body: >-
      Two golden hours plus a moonlit night is the target. Midday is for driving and flat-light texture work — Goldfield siding, the bunker grid, Walker Lake's saturated blue. Don't burn energy on harsh-noon landscapes.

colophon:
  artDirection: >-
    Each stop leads with reference photographs of the actual place — tap any to view it full-screen. The light, glass and 'the shot' notes are the art direction — the look to chase at each stop, not a guarantee of the conditions you'll get.
  photographers: >-
    Nick Carver (large-format Americana, facades, weathered signage) · Michael Shainblum (desert & night skies) · Thomas Heaton (patient minimal landscape, single strong subject) · Nick Page (bold light, graphic compositions).
  route: >-
    Reno → US-95 S → Las Vegas. Timings assume a Saturday-morning departure and one night in Tonopah. Verify fuel hours, Death Valley / Tioga-style seasonal access, and any dirt-road or fire closures close to your dates.
