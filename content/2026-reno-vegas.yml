      - id: tonopah
        name: Tonopah
        when: Blue hour → moonlit night
        gps:
          lat: 38.0692
          lng: -117.2306
          label: Historic Mining Park, Main St
          elev: 6047
        description: >-
          A silver-boom town frozen halfway to ghost — and the natural midpoint of the whole drive. The **Historic Mining Park** puts weathered headframes and hoist works on the hill directly above Main Street; the **Clown Motel** and the old cemetery sit side by side at the north end; the Mizpah Hotel anchors downtown. Tonopah is famous for some of the **darkest skies in the country** — but you're here on a full moon, so lean into it — silvered mine timbers and empty streets under moonlight instead of the core.
        directions:
          - label: Light
            value: Blue hour on the headframes · moonlight after dark
          - label: Glass
            value: 24–70 · tripod for dusk + moonlit long exposures
          - label: Stay
            value: Mizpah, Clown Motel, or dispersed BLM outside town
        theShot: >-
          A headframe stark against the deep blue-to-black sky just after sunset, town lights beginning below. Later — the mining park bones lit only by the full moon, long exposure, hard shadows.
        images:
          - file: tonopah-shot.webp
            role: shot
