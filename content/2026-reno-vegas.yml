# 2026-reno-vegas — the worked-example migration (handoff-spec §8, migration-spec §3).
#
# STRUCTURE (moon, darkSites, gps, day/stop membership, elev→number, alt promotion)
# was generated from guides/2026-reno-vegas/config.json with:
#     node build/config-to-yml.mjs 2026-reno-vegas
# PROSE (masthead, descriptions, directions, theShot, day themes/briefs/legs,
# fieldNotes, colophon) is hand-ported from guides/2026-reno-vegas/content.html —
# the copy IS the product (non-negotiable #4). The SVG stop-visual placeholders are
# dropped; galleries come from finalize (public/guides/<slug>/ + images: below).
masthead:
  eyebrow: Shooting Script · Solo · Late September
  title: Reno to Las Vegas, down the *empty middle*
  dek: >-
    Two days south on US-95 through the loneliest basins in Nevada — a cobalt desert lake, a valley of ammunition bunkers, three ghost towns and a forest of buried cars. Built around the ends of the day, with a full moon to light the ruins after dark. Not much between the dots — that's the point.
  meta:
    - ~450 mi total
    - 1 night Tonopah
    - Depart Sat AM
    - Route US-95 S
    - Golden hours + a full moon
  # Saturday departure — drives the derived "Day N · Weekday" labels (Sat, Sun).
  startDate: 2026-09-26

moon:
  start: 2026-09-24
  end: 2026-09-28

darkSites: Tonopah, Goldfield, the Rhyolite flats

days:
  - theme: The High-Desert Run
    route: Reno → Tonopah
    summary: >-
      Drop out of Reno onto US-95 and run the empty basins south. A river-fort ruin, a big blue lake, a valley of bunkers — then land in Tonopah for the mining town and a moonlit night at 6,000 ft. ~255 mi.
    legs:
      - at: AM
        text: depart Reno · US-95 S
      - at: opt
        text: Fort Churchill
      - at: midday
        text: Walker Lake
      - at: pm
        text: Hawthorne bunkers
      - at: dusk
        text: Tonopah
    brief:
      - label: Fuel
        icon: "⛽"
        value: Fallon, Hawthorne, Tonopah — long empty gaps between. Top off every chance.
      - label: Signal
        icon: "📵"
        value: Dead across most of US-95. Download maps + this guide before you leave.
      - label: Water
        icon: "💧"
        value: Carry 4+ L — nothing roadside at Walker Lake or the bunkers.
      - label: Drive
        icon: "🚗"
        value: ~255 mi · 4.5–5 hr moving
      - label: Camp
        icon: "▲"
        value: >-
          Overnight Tonopah — Mizpah or Clown Motel in town, or free dispersed BLM just outside. Your highest, coldest night at ~6,000 ft; pack a real warm layer even in September. Fuel and food before you turn in.
    stops:
      - id: fortchurchill
        name: Fort Churchill
        badge: state park
        optional: true
        when: Morning · quick warm-up
        gps:
          lat: 39.2936
          lng: -119.2889
          label: adobe ruins, off Alt US-95
          elev: 4255
        description: >-
          An 1860s U.S. Army cavalry post melting back into the desert — **roofless adobe walls** ranged along the Carson River, cottonwoods behind them, a small pioneer cemetery. A short detour off the Alt US-95 corridor near Silver Springs, almost nobody there. This is your Nick Carver warm-up — earth-colored walls, texture, restraint. Morning side-light rakes the eroded adobe best.
        directions:
          - label: Light
            value: Low AM side-light on the walls
          - label: Glass
            value: 35 / 50 · documentary, restrained
          - label: Access
            value: Paved park road — any car · small fee
        theShot: >-
          One adobe wall raking away from camera, warm light catching the crumbling edges, cottonwoods and empty sky behind. Then a tight detail of eroded mud brick.
        images:
          - file: fortchurchill-shot.webp
            role: shot
            source: wikimedia
            artist: Peretz Partensky from San Francisco, USA
            license: CC BY-SA 2.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Fort_Churchill_(5752450217).jpg
          - file: fortchurchill-wide.webp
            role: wide
            source: wikimedia
            artist: Kelapstick
            license: CC BY 3.0
            licenseUrl: https://creativecommons.org/licenses/by/3.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Fort_Churchill,_Nevada_Ruins_3DSC09896.JPG
          - file: fortchurchill-mood.webp
            role: mood
            source: wikimedia
            artist: Jpledia
            license: CC BY-SA 3.0
            licenseUrl: https://creativecommons.org/licenses/by-sa/3.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Fort_Churchill_Gelatin.jpg

      - id: walker
        name: Walker Lake
        when: Midday · roadside
        gps:
          lat: 38.6957
          lng: -118.7108
          label: Sportsman's Beach, US-95
          elev: 4100
        description: >-
          A startling **deep-blue desert lake** with the barren Wassuk Range dropping straight into it — US-95 runs for miles right along the eastern shore, so it comes to you. Heaton-style minimalism — water, ridge, sky, nothing else. Pull off at **Sportsman's Beach** or any of the shoulder turnouts. The blue punches hardest under high sun; a polarizer deepens it.
        directions:
          - label: Light
            value: Any · high sun saturates the blue
          - label: Glass
            value: Wide for emptiness · long to stack ridge on water
          - label: Access
            value: Paved turnouts right off US-95
        theShot: >-
          Horizon on the lower third, one clean band of cobalt water under the bare range. Polarize to kill glare and saturate. Or go long and compress the ridge onto the waterline.
