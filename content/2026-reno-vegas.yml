      - id: tonopah-alt
        name: Old Cemetery · Clown Motel
        optional: true
        when: Night · north end of Main St
        gps:
          lat: 38.0778
          lng: -117.2314
          label: old cemetery & motel, north end of Main St
          elev: 6030
        description: >-
          The old town cemetery and the roadside-famous **Clown Motel** share a lot at the north end of Main Street — weathered headboards against desert, kitsch neon against the dark. A quick, strange add-on to the mining park under the same full moon.

  - theme: Ghost Towns & Blue Water
    route: Tonopah → Las Vegas
    summary: >-
      The good stuff, packed into the southern half — two ghost towns, a forest of buried cars, an optional Death Valley overlook and a turquoise desert oasis, then the casino lights. ~210 mi + detours.
    legs:
      - at: AM
        text: Goldfield
      - at: AM
        text: Car Forest
      - at: midday
        text: Rhyolite · Goldwell
      - at: opt
        text: Zabriskie Point
      - at: pm
        text: Ash Meadows
      - at: eve
        text: Las Vegas
    brief:
      - label: Fuel
        icon: "⛽"
        value: Tonopah and Beatty — top off at both; long empty legs between.
      - label: Signal
        icon: "📵"
        value: Dead from Goldfield through Beatty; returns near Amargosa.
      - label: Heat
        icon: "🏜"
        value: >-
          Death Valley & Ash Meadows still hit 100°F+ in late Sept — shoot the low stops at dawn/early, carry extra water.
      - label: Drive
        icon: "🚗"
        value: ~210 mi + Zabriskie detour (adds ~1 hr)
      - label: Finish
        icon: "◆"
        value: >-
          US-95 S through Amargosa Valley and Indian Springs into Las Vegas for Sunday evening. If the light's still working near Indian Springs, that Joshua-tree flat is the sleeper frame of the drive.
    stops:
      - id: goldfield
        name: Goldfield
        when: Early morning · first stop
        gps:
          lat: 37.7086
          lng: -117.2364
          label: Goldfield Hotel, US-95
          elev: 5689
        description: >-
          Once the biggest city in Nevada, now ~250 people among the bones of a gold rush. The grand shuttered **Goldfield Hotel**, the stone courthouse, the Santa Fe Saloon, rusted autos and mine headframes scattered through the sage. This is your Americana chapter — hand-painted signage, sun-bleached siding, rust and patina. Flat morning light is fine; you're shooting texture and story, not sky.
        directions:
          - label: Light
            value: Flat OK · low sun for wood grain
          - label: Glass
            value: 35 / 50 · tight on texture & signage
          - label: Note
            value: Buildings are private/fragile — shoot from public ground
        theShot: >-
          The Goldfield Hotel dead-on, symmetrical, filling the frame — then break it with a tight detail — a cracked sign, a rusted fender, peeling paint on siding. Shoot for a diptych.
        images:
          - file: goldfield-shot.webp
            role: shot
            source: wikimedia
            artist: Rick Cooper
            license: CC BY 2.0
            licenseUrl: https://creativecommons.org/licenses/by/2.0
            sourceUrl: https://commons.wikimedia.org/wiki/File:Goldfield_NV_-_street_scenery.jpg
